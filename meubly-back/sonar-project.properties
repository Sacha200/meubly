# ==============================================================================
# SonarQube - Meubly Backend (Express.js / Node.js)
# ==============================================================================
# SonarQube local: http://localhost:9000
# Ce fichier configure l'analyse du backend meubly-back.
# IMPORTANT: ne jamais ecrire de token en clair dans ce fichier.
# ==============================================================================

# ------------------------------------------------------------------------------
# CONNEXION AU SERVEUR SONARQUBE
# ------------------------------------------------------------------------------
sonar.host.url=http://localhost:9000
# Le token doit etre fourni via variable d'environnement:
# PowerShell (session courante): $env:SONAR_TOKEN="votre_token"
# NE PAS UTILISER: sonar.token=...

# ------------------------------------------------------------------------------
# Identification du projet
# ------------------------------------------------------------------------------
sonar.projectKey=meubly-back
sonar.projectName=Meubly - Backend
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# ------------------------------------------------------------------------------
# Sources
# ------------------------------------------------------------------------------
sonar.sources=.
sonar.inclusions=**/*.js
sonar.exclusions=\
  **/node_modules/**,\
  **/coverage/**,\
  **/dist/**,\
  **/scripts/**,\
  **/*.config.js,\
  **/*.config.mjs,\
  **/package*.json,\
  **/Dockerfile,\
  **/.env*

# ------------------------------------------------------------------------------
# Tests & couverture
# ------------------------------------------------------------------------------
sonar.tests=tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=\
  **/scripts/**,\
  **/tests/**,\
  **/app.js,\
  **/supabase.js

# ------------------------------------------------------------------------------
# Analyse
# ------------------------------------------------------------------------------
sonar.scm.disabled=true
sonar.cpd.minimumtokens=50
sonar.cpd.minimumlines=10

# ==============================================================================
# NOTES D'UTILISATION
# ==============================================================================
# 1) DEMARRER SONARQUBE
#    Depuis la racine du repo:
#      docker compose --profile sonar up -d sonarqube_db sonarqube
#
# 2) CREER UN TOKEN SONARQUBE (User token recommande)
#    a) Ouvrir http://localhost:9000
#    b) Login admin/admin (au premier lancement), puis changer le mot de passe
#    c) Aller dans: My Account -> Security
#    d) "Generate Tokens" -> donner un nom (ex: meubly-back-local) -> Generate
#    e) Copier le token immediatement (il ne sera plus re-affiche)
#
# 3) CONSERVER LE TOKEN SANS LE COMMITER
#    Option A (temporaire, session PowerShell en cours):
#      $env:SONAR_TOKEN="votre_token"
#
#    Option B (persistant pour ton utilisateur Windows):
#      [Environment]::SetEnvironmentVariable("SONAR_TOKEN","votre_token","User")
#      # Ouvrir un nouveau terminal apres cette commande
#
#    Option C (recommande securite): stocker dans un gestionnaire de secrets
#    (ex: 1Password, Bitwarden, Credential Manager), puis l'injecter au runtime.
#
# 4) GENERER LA COUVERTURE AVANT SCAN
#      cd meubly-back
#      npm run test:coverage
#
# 5) LANCER L'ANALYSE (PowerShell, depuis la racine du projet meubly/)
#
#   $env:SONAR_TOKEN="VOTRE_TOKEN"
#   $p=(Get-Location).Path
#   docker run --rm `
#     -e SONAR_HOST_URL="http://host.docker.internal:9000" `
#     -e SONAR_TOKEN=$env:SONAR_TOKEN `
#     -v "$p/meubly-back:/usr/src" `
#     sonarsource/sonar-scanner-cli:latest
#
# 6) DEPANNAGE RAPIDE
#    - Erreur 401: token invalide/expire -> regenerer un User token
#    - SonarQube inaccessible: verifier `docker compose --profile sonar ps`
#    - Couverture absente: verifier `coverage/lcov.info`
#    - Projet non visible: relancer le scan avec le meme `sonar.projectKey`
# ==============================================================================
