# ==============================================================================
# SonarQube - Meubly Frontend (Vue 3 / Vite)
# ==============================================================================
# Serveur: http://localhost:9000
# Token: My Account → Security → Generate Token (User token)
# ==============================================================================

sonar.host.url=http://localhost:9000
# sonar.token=  ← Ne pas commiter. Utiliser: $env:SONAR_TOKEN="xxx"

# ------------------------------------------------------------------------------
# Identification du projet
# ------------------------------------------------------------------------------
sonar.projectKey=meubly-front
sonar.projectName=Meubly - Frontend
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# ------------------------------------------------------------------------------
# Sources
# ------------------------------------------------------------------------------
sonar.sources=src
sonar.inclusions=**/*.js,**/*.vue
sonar.exclusions=\
  **/node_modules/**,\
  **/coverage/**,\
  **/dist/**,\
  **/.vite/**,\
  **/cypress/**,\
  **/*.config.js,\
  **/tailwind.config.js,\
  **/postcss.config.js,\
  **/package*.json,\
  **/Dockerfile,\
  **/.env*

# ------------------------------------------------------------------------------
# Tests & couverture
# ------------------------------------------------------------------------------
sonar.tests=tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=\
  **/main.js,\
  **/router/**,\
  **/tests/**

# ------------------------------------------------------------------------------
# Analyse
# ------------------------------------------------------------------------------
sonar.scm.disabled=true
sonar.cpd.minimumtokens=50
sonar.cpd.minimumlines=10

# ==============================================================================
# Lancer l'analyse (PowerShell, depuis la racine du projet meubly/) :
#
#   $env:SONAR_TOKEN="VOTRE_TOKEN"
#   $p=(Get-Location).Path
#   docker run --rm `
#     -e SONAR_HOST_URL="http://host.docker.internal:9000" `
#     -e SONAR_TOKEN=$env:SONAR_TOKEN `
#     -v "$p/meubly-front:/usr/src" `
#     sonarsource/sonar-scanner-cli:latest
#
# Ou générer la couverture avant:
#   cd meubly-front && npm run test:coverage
# ==============================================================================
